defaults:
  - _self_

can:
  N: 4096
  L: 8
  wta: block           # "block" for block_softmax (uses L), "global" for global softmax
  zero_within_block: true
  temperature: 1
  embedding:
    omega_MA: 32.0
  stability:
    omega_MAs: [8, 32, 128]
    noise_levels: [0, 0.00001, 0.0001]
    n_steps: 50
    n_init_positions: 40
    synaptic_noise: 0
