defaults:
  - _self_

data:
  seq_len: 200
  dim: 2
  box_width: 2
  box_height: 2
  n_shift: 15
  sigma_shift: 3
  save_path: "data/"

model:
  _target_: rgm.ActionableRGM
  input_size: ${data.dim}
  latent_size: 65  # D
  om_init_scale: 2

training:
  epochs: 400
  train_iterations: 10
  val_iterations: 1
  K: 10
  batch_size: 5
  vary_seed: false
  vary_data: true

loss:
  _target_: losses.total_sep_loss
  sigma_sq: 0.04
  sigma_theta: 0.5
  f: 1
  sep_scale: 100
  causal: true
  decay: 0.95

regularization:
  positivity:
    _target_: schedulers.GECO
    lambda_init: 1
    k: -9
    alpha: 0.9
    gamma: 0.001
  norm:
    _target_: schedulers.GECO
    lambda_init: 0.005
    k: -3
    alpha: 0.9
    gamma: 0.001

optimizer:
  _target_: torch.optim.Adam
  lr: 1e-1
  betas: [0.9, 0.9]
  eps: 1e-8  # eta - numerical stability

convergence:
  enabled: false
  window: 1000
  patience: 100
  threshold: 0.1
  smoothing: 20

can:
  N: 4096
  L: 8
  embedding:
    omega_MA: 32.0
  stability:
    omega_MAs: [8, 32, 128]
    noise_levels: [0.1, 0.5, 0.7]
    n_steps: 50
    n_init_positions: 40
    synaptic_noise: 1.0
